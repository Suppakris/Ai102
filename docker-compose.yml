# Run the whole stack on Docker:
#
#   docker compose up --build
#
# Boot order: db (healthy) → migrate (prisma migrate deploy, one-shot)
# → app (http://localhost:3000) + worker (BullMQ image-generation consumer).
# redis backs the job queue used to move AI image generation off the web
# server process; without it (REDIS_URL unset) the app would just run those
# jobs inline instead.
#
# LLM access from inside the container:
#   - Ollama on the host machine is reachable at host.docker.internal:11434
#     (the default OLLAMA_BASE_URL below).
#   - For OpenRouter instead, set LLM_PROVIDER=openrouter and
#     OPENROUTER_API_KEY in a `.env` file next to this compose file.
#
# Auth: GITHUB_CLIENT_ID/SECRET and NEXTAUTH_SECRET/URL are required at
# runtime (src/backend/auth.ts, src/env.js). The placeholders below let the
# stack boot without real GitHub credentials — enough to browse the app and
# hit its APIs — but signing in with GitHub won't work until you set real
# values in a `.env` file next to this compose file.

name: ai102

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai102
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      # Host access for `prisma studio` / psql; not needed by the app itself.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai102"]
      interval: 3s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai102
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai102
      # NODE_ENV=production normally selects the Neon serverless adapter
      # (src/backend/db.ts); this forces the plain pg adapter, which is what
      # a local Postgres container speaks.
      LOCAL_PRODUCTION: "1"
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-only-secret-change-me}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-dev-placeholder-client-id}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-dev-placeholder-client-secret}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      FAL_API_KEY: ${FAL_API_KEY:-}
    extra_hosts:
      # Linux hosts don't get host.docker.internal automatically.
      - "host.docker.internal:host-gateway"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      target: worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai102
      LOCAL_PRODUCTION: "1"
      REDIS_URL: redis://redis:6379
      TOGETHER_AI_API_KEY: ${TOGETHER_AI_API_KEY:-}
      FAL_API_KEY: ${FAL_API_KEY:-}
      UPLOADTHING_TOKEN: ${UPLOADTHING_TOKEN:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  db-data:
  redis-data:
